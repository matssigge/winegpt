services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wine
      POSTGRES_USER: wine
      POSTGRES_PASSWORD: wine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wine -d wine"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    command: cargo run --manifest-path backend/Cargo.toml
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BACKEND_BIND_ADDR: 0.0.0.0:3000
      DATABASE_URL: postgres://wine:wine@postgres:5432/wine
      FRONTEND_ORIGINS: http://127.0.0.1:5273,http://localhost:5273,http://frontend:5273,http://127.0.0.1:4173,http://localhost:4173
    volumes:
      - ./backend:/app/backend
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - backend-target:/app/backend/target
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    command: npm run dev -- --host 0.0.0.0 --port 5273
    working_dir: /app/frontend
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: ""
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    ports:
      - "5273:5273"

  backend-test:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    command: cargo test --manifest-path backend/Cargo.toml -- --test-threads=1
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://wine:wine@postgres:5432/wine
    volumes:
      - ./backend:/app/backend
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - backend-target:/app/backend/target

  frontend-build:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    command: npm run build
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules

  frontend-test:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    command: npm test
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules

  frontend-e2e:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: e2e
    command: npm run test:e2e
    working_dir: /app/frontend
    depends_on:
      - backend
      - frontend
    environment:
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules

volumes:
  backend-target:
  cargo-git:
  cargo-registry:
  frontend-node-modules:
  postgres-data:
