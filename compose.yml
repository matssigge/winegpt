services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    command: cargo run --manifest-path backend/Cargo.toml
    working_dir: /app
    environment:
      BACKEND_BIND_ADDR: 0.0.0.0:3000
    volumes:
      - ./backend:/app/backend
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - backend-target:/app/backend/target
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    command: npm run dev -- --host 0.0.0.0 --port 5273
    working_dir: /app/frontend
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    ports:
      - "5273:5273"

  backend-test:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    command: cargo test --manifest-path backend/Cargo.toml
    working_dir: /app
    volumes:
      - ./backend:/app/backend
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - backend-target:/app/backend/target

  frontend-build:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    command: npm run build
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules

  frontend-test:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    command: npm test
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules

volumes:
  backend-target:
  cargo-git:
  cargo-registry:
  frontend-node-modules:
