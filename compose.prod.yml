services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    environment:
      BACKEND_BIND_ADDR: 0.0.0.0:3000
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: runtime
    depends_on:
      - backend
    ports:
      - "4173:4173"
