services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wine
      POSTGRES_USER: wine
      POSTGRES_PASSWORD: wine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wine -d wine"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BACKEND_BIND_ADDR: 0.0.0.0:3000
      DATABASE_URL: postgres://wine:wine@postgres:5432/wine
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: runtime
    depends_on:
      - backend
    ports:
      - "4173:4173"

volumes:
  postgres-data:
